<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelVault</title>

<style>
:root {
    --bg: #ffffff;
    --text: #000;
    --card: #f4f4f4;
}

body.dark {
    --bg: #0f172a;
    --text: #fff;
    --card: #1e293b;
}

body {
    margin: 0;
    font-family: Arial;
    background: var(--bg);
    color: var(--text);
    transition: 0.4s;
}

/* LOGIN PAGE */
#loginPage {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

.login-box {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.2);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    animation: fadeIn 1s ease;
}

.login-box h2 {
    margin-bottom: 20px;
}

.login-box input {
    padding: 10px;
    width: 220px;
    border-radius: 20px;
    border: none;
    margin-bottom: 15px;
}

.login-box button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: black;
    color: white;
    transition: 0.3s;
}

.login-box button:hover {
    transform: scale(1.1);
}

/* MAIN */
#mainPage {
    display: none;
    animation: fadeIn 0.8s ease;
}

.header {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    align-items: center;
}

.header h2 {
    font-weight: bold;
}

/* BUTTONS */
button {
    cursor: pointer;
}

/* SEARCH */
.search {
    text-align: center;
    margin: 15px;
}

.search input {
    padding: 10px;
    width: 250px;
    border-radius: 20px;
    border: 1px solid gray;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    position: relative;
    border-radius: 15px;
    overflow: hidden;
    background: var(--card);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* LIKE */
.like {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 20px;
    cursor: pointer;
}

/* LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.lightbox img {
    max-width: 80%;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <div class="login-box">
        <h2>✨ Welcome to PixelVault</h2>
        <input type="text" id="username" placeholder="Enter your name"><br>
        <button onclick="login()">Enter</button>
    </div>
</div>

<!-- MAIN -->
<div id="mainPage">

<div class="header">
    <h2>📸 PixelVault</h2>
    <div>
        <button onclick="toggleMode()">🌙/☀️</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="search">
    <input type="text" placeholder="Search category..." onkeyup="search(this.value)">
</div>

<div class="gallery" id="gallery"></div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
</div>

<script>
let images = [
{src:"https://picsum.photos/id/1015/400/300",tag:"nature"},
{src:"https://picsum.photos/id/1016/400/300",tag:"nature"},
{src:"https://picsum.photos/id/1018/400/300",tag:"nature"},
{src:"https://picsum.photos/id/1020/400/300",tag:"nature"},
{src:"https://picsum.photos/id/1024/400/300",tag:"animals"},
{src:"https://picsum.photos/id/1025/400/300",tag:"city"},
{src:"https://picsum.photos/id/1031/400/300",tag:"city"},
{src:"https://picsum.photos/id/1035/400/300",tag:"city"},
{src:"https://picsum.photos/id/1040/400/300",tag:"tech"},
{src:"https://picsum.photos/id/1050/400/300",tag:"tech"},
{src:"https://picsum.photos/id/1060/400/300",tag:"tech"},
{src:"https://picsum.photos/id/1070/400/300",tag:"animals"},
{src:"https://picsum.photos/id/1080/400/300",tag:"animals"},
{src:"https://picsum.photos/id/109/400/300",tag:"nature"},
{src:"https://picsum.photos/id/110/400/300",tag:"city"}
];

let liked = JSON.parse(localStorage.getItem("liked")) || [];

/* LOGIN */
function login(){
    let name = document.getElementById("username").value;
    if(name){
        localStorage.setItem("user", name);
        showMain();
    }
}

function logout(){
    localStorage.removeItem("user");
    location.reload();
}

function showMain(){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("mainPage").style.display="block";
    loadGallery();
}

/* LOAD */
function loadGallery(){
    let g = document.getElementById("gallery");
    g.innerHTML="";
    images.forEach((img,i)=>{
        let isLiked = liked.includes(i);
        g.innerHTML += `
        <div class="card">
            <span class="like" onclick="toggleLike(${i})">${isLiked?"❤️":"🤍"}</span>
            <img src="${img.src}" onclick="openLightbox('${img.src}')">
        </div>`;
    });
}

/* LIKE */
function toggleLike(i){
    if(liked.includes(i)){
        liked = liked.filter(x=>x!==i);
    } else {
        liked.push(i);
    }
    localStorage.setItem("liked", JSON.stringify(liked));
    loadGallery();
}

/* SEARCH */
function search(val){
    val = val.toLowerCase();
    let g = document.getElementById("gallery");
    g.innerHTML="";
    images.forEach((img,i)=>{
        if(img.tag.includes(val)){
            let isLiked = liked.includes(i);
            g.innerHTML += `
            <div class="card">
                <span class="like" onclick="toggleLike(${i})">${isLiked?"❤️":"🤍"}</span>
                <img src="${img.src}" onclick="openLightbox('${img.src}')">
            </div>`;
        }
    });
}

/* LIGHTBOX */
function openLightbox(src){
    document.getElementById("lightbox").style.display="flex";
    document.getElementById("lightbox-img").src=src;
}
function closeLightbox(){
    document.getElementById("lightbox").style.display="none";
}

/* DARK MODE */
function toggleMode(){
    document.body.classList.toggle("dark");
}

/* AUTO LOGIN */
if(localStorage.getItem("user")){
    showMain();
}
</script>

</body>
</html>
